name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - run: task build
      - run: task vet
      - run: task test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
      - run: task lint
